<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScholarAI - Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }

    .navbar {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      padding: 16px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    .navbar h1 { font-size: 22px; }
    .badge {
      background: #ff4757;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .container { display: flex; min-height: calc(100vh - 60px); }

    .sidebar {
      width: 220px;
      background: #1a1a2e;
      padding: 24px 16px;
    }
    .sidebar a {
      display: block;
      padding: 12px 16px;
      color: #aaa;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 14px;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #0f3460;
      color: white;
    }

    .main { flex: 1; padding: 28px; }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .stats { display: flex; gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      flex: 1;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-top: 4px solid #0f3460;
    }
    .stat-card h3 { font-size: 36px; color: #0f3460; font-weight: 700; }
    .stat-card p { color: #888; font-size: 13px; margin-top: 6px; }

    .section {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .section h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f2f5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th {
      background: #f8f9fa;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #555;
      border-bottom: 2px solid #eee;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }
    tr:hover { background: #fafafa; }

    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .tag.complete { background: #e8f5e9; color: #2e7d32; }
    .tag.incomplete { background: #fff3e0; color: #e65100; }

    .del-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .del-btn:hover { background: #cc0000; }

    .scholarship-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }
    .s-card {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 16px;
      border-left: 4px solid #0f3460;
    }
    .s-card h4 { font-size: 14px; color: #1a1a2e; margin-bottom: 6px; }
    .s-card p { font-size: 12px; color: #666; margin-bottom: 3px; }

    .logout-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="navbar">
  <h1>🎓 ScholarAI <span class="badge">ADMIN</span></h1>
  <button class="logout-btn" onclick="adminLogout()">🚪 Logout</button>
</div>

<div class="container">

  <div class="sidebar">
    <a href="#users" class="active" onclick="showSection('users')">👥 All Users</a>
    <a href="#scholarships" onclick="showSection('scholarships')">🎓 Scholarships</a>
    <a href="/" >🌐 View Website</a>
  </div>

  <div class="main">

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <h3 id="total-users">0</h3>
        <p>Total Users</p>
      </div>
      <div class="stat-card">
        <h3 id="complete-profiles">0</h3>
        <p>Complete Profiles</p>
      </div>
      <div class="stat-card">
        <h3 id="total-scholarships">0</h3>
        <p>Total Scholarships</p>
      </div>
    </div>

    <!-- USERS TABLE -->
    <div class="section" id="section-users">
      <h2>👥 Registered Users</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Education</th>
            <th>Category</th>
            <th>State</th>
            <th>Profile</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="users-table">
          <tr><td colspan="8" style="text-align:center;color:#888;">Loading users...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- SCHOLARSHIPS -->
    <div class="section" id="section-scholarships" style="display:none;">
      <h2>🎓 Managed Scholarships</h2>
      <div class="scholarship-grid" id="scholarship-grid">
        Loading...
      </div>
    </div>

  </div>
</div>

<script>
  // Check admin
  if (localStorage.getItem("is_admin") !== "true") {
    window.location.href = "/admin";
  }

  // Load stats
  fetch("/admin/get_stats")
  .then(r => r.json())
  .then(data => {
    document.getElementById("total-users").textContent = data.total_users;
    document.getElementById("complete-profiles").textContent = data.profiles_complete;
    document.getElementById("total-scholarships").textContent = data.total_scholarships;
  });

  // Load users
  fetch("/admin/get_users")
  .then(r => r.json())
  .then(users => {
    const tbody = document.getElementById("users-table");
    if (users.length === 0) {
      tbody.innerHTML = "<tr><td colspan='8' style='text-align:center;color:#888;'>No users registered yet</td></tr>";
      return;
    }
    tbody.innerHTML = "";
    users.forEach(u => {
      const isComplete = u.education !== "Not set";
      tbody.innerHTML += `
        <tr>
          <td>${u.id}</td>
          <td><strong>${u.name}</strong></td>
          <td>${u.email}</td>
          <td>${u.education}</td>
          <td>${u.category}</td>
          <td>${u.state}</td>
          <td>
            <span class="tag ${isComplete ? 'complete' : 'incomplete'}">
              ${isComplete ? '✅ Complete' : '⚠️ Incomplete'}
            </span>
          </td>
          <td>
            <button class="del-btn" onclick="deleteUser(${u.id}, this)">🗑 Delete</button>
          </td>
        </tr>`;
    });
  });

  // Load scholarships
  fetch("/get_scholarships", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: null })
  })
  .then(r => r.json())
  .then(data => {
    const grid = document.getElementById("scholarship-grid");
    grid.innerHTML = "";
    data.forEach(s => {
      grid.innerHTML += `
        <div class="s-card">
          <h4>${s.name}</h4>
          <p>🏛️ ${s.provider}</p>
          <p>💰 ${s.amount}</p>
          <p>📅 ${s.deadline}</p>
          <p>✅ Match: ${s.match}</p>
        </div>`;
    });
  });

  // Delete user
  function deleteUser(id, btn) {
    if (!confirm("Are you sure you want to delete this user?")) return;
    fetch("/admin/delete_user", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id })
    })
    .then(r => r.json())
    .then(data => {
      btn.closest("tr").remove();
      alert("User deleted successfully!");
    });
  }

  // Show section
  function showSection(name) {
    document.getElementById("section-users").style.display = name === "users" ? "block" : "none";
    document.getElementById("section-scholarships").style.display = name === "scholarships" ? "block" : "none";
    document.querySelectorAll(".sidebar a").forEach((a, i) => {
      a.classList.toggle("active", (name === "users" && i === 0) || (name === "scholarships" && i === 1));
    });
  }

  // Logout
  function adminLogout() {
    localStorage.removeItem("is_admin");
    window.location.href = "/";
  }
</script>
</body>
</html>
